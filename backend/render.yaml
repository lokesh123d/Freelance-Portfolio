services:
  - type: web
    name: stitch-portfolio-backend
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: CLIENT_ORIGIN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: OWNER_NAME
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
